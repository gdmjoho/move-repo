apiVersion: v1
kind: Secret
metadata:
  name: nutanix-move-repo-tls
  namespace: nutanix-move-repo
type: kubernetes.io/tls
data:
  # Base64-encoded certificate and key.
  # Generate with:
  #   kubectl create secret tls nutanix-move-repo-tls \
  #     --cert=path/to/cert.crt \
  #     --key=path/to/cert.key \
  #     -n nutanix-move-repo \
  #     --dry-run=client -o yaml > k8s/examples/tls-secret.yaml
  #
  # Or from an existing PEM file:
  #   kubectl create secret tls nutanix-move-repo-tls \
  #     --cert=fullchain.pem \
  #     --key=privkey.pem \
  #     -n nutanix-move-repo
  tls.crt: |
    <base64-encoded-certificate>
  tls.key: |
    <base64-encoded-private-key>
